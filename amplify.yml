version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.12.4
        - pnpm install --no-frozen-lockfile --force
    build:
      commands:
        - env | grep -e DATABASE_URL -e SPOONACULAR_API_KEY -e COGNITO_CLIENT_ID -e COGNITO_USER_POOL_ID -e COGNITO_REGION -e RESEND_API_KEY >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
