version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - env | grep -e DATABASE_URL -e SPOONACULAR_API_KEY -e COGNITO_CLIENT_ID -e COGNITO_USER_POOL_ID -e COGNITO_REGION >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
